        <span>搜索常规采购、小喇叭/无供应商采购、比选 (Ctrl+K)</span>

      <div class="nav-actions">
        <button type="button"><img src="https://www.figma.com/api/mcp/asset/df2e7889-e2df-435c-9975-809a8d33745e" alt="" />任务</button>
        <button type="button"><img src="https://www.figma.com/api/mcp/asset/abf27623-f8c9-4f79-b2ab-7759a636759b" alt="" />帮助</button>

        <button id="logoutBtnTop" class="logout-top" type="button">退出</button>

          <a class="menu-item" href="javascript:void(0)">

            <span>报表</span>
          </a>
        </nav>

        <div class="side-divider"></div>

        <nav class="side-menu bottom">
          <a class="menu-item" href="javascript:void(0)">

        </button>
      </aside>

      <main class="workspace">
        <section class="hero-card">

            <img src="https://www.figma.com/api/mcp/asset/3561d76f-2498-4df9-9409-473b3b422577" alt="" />
            <h1>MM Agent，你的智能工作助手</h1>

          <p id="welcomeText" class="welcome">欢迎你，-</p>

          <div class="prompt-box">
            <div class="prompt-input">
              <span class="prompt-caret">|</span>
              <span class="prompt-text">下午好，我能帮您什么?</span>
            </div>
            <div class="prompt-toolbar">
              <div class="left-tools">
                <button class="tool-icon" type="button">
                  <img src="https://www.figma.com/api/mcp/asset/7c5989a1-345a-4236-ab72-aaf7a2bfc8eb" alt="" />

                <button class="tool-text" type="button">
                  <img src="https://www.figma.com/api/mcp/asset/fd1a7ba2-1024-43b3-aa12-0d997b34eaf6" alt="" />
                  <span>技能</span>
                </button>
              </div>
              <div class="right-tools">
                <button class="model-btn" type="button">
                  <img src="https://www.figma.com/api/mcp/asset/2e08eea4-1b15-4d72-8a2d-8e8cec9679cf" alt="" />

                  <img class="caret" src="https://www.figma.com/api/mcp/asset/f28b9de5-8ce8-47a4-a7a3-e40269c5aa72" alt="" />

                <button class="send-btn" type="button">
                  <img src="https://www.figma.com/api/mcp/asset/81aac519-9b66-4948-a07a-84994d24bc37" alt="" />
                </button>
              </div>
            </div>
          </div>

          <div class="quick-actions">
            <button type="button"><img src="https://www.figma.com/api/mcp/asset/4d836ac3-fa3e-4e3e-8953-ddce52e6b466" alt="" />定时建单</button>
            <button type="button"><img src="https://www.figma.com/api/mcp/asset/fcb404de-19af-4c03-b38a-3a80daa2854b" alt="" />单据检索</button>
            <button type="button"><img src="https://www.figma.com/api/mcp/asset/da6323a3-f2b9-4cfd-ba3d-e5fbc63085ba" alt="" />预算跟踪</button>
            <button type="button"><img src="https://www.figma.com/api/mcp/asset/e45e075d-7f86-46b8-a2ae-5decfaebbef3" alt="" />知识问答</button>
            <button type="button"><img src="https://www.figma.com/api/mcp/asset/ff18bccc-2c99-4712-b305-588006225bbc" alt="" />数据整理</button>
          </div>

        <section class="module-row">
          <article class="module-card">
            <header>
              <h2><i></i>模块N</h2>
              <button type="button"><img src="https://www.figma.com/api/mcp/asset/9bede596-3c99-4ab9-855e-d03b36ab8331" alt="" /></button>

              <h2><i></i>模块N</h2>
